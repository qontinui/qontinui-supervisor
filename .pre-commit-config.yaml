repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: check-yaml
      - id: check-toml
      - id: check-added-large-files
      - id: check-merge-conflict

  - repo: local
    hooks:
      # Runs first because fmt is the cheaper / faster gate and the one
      # that has historically slipped through to CI (PRs #40, #43, and the
      # d38ec75 direct-to-main commit all landed unformatted because no
      # local hook caught it). Supervisor's `Rust Check` workflow runs
      # `cargo fmt --check` and `cargo clippy -- -D warnings` in sequence;
      # mirror both locally to fail-fast on either.
      - id: cargo-fmt
        name: cargo fmt --check
        entry: cargo fmt -- --check
        language: system
        types: [rust]
        pass_filenames: false

      - id: cargo-clippy
        name: cargo clippy
        entry: cargo clippy -- -D warnings
        language: system
        types: [rust]
        pass_filenames: false

ci:
  autofix_prs: true
  autofix_commit_msg: "chore: pre-commit auto fixes"
