name: Spec Pairing Gate

# Phase B5e — Verify every legacy `*.spec.uibridge.json` is paired with an IR
# file under `specs/pages/<id>/`, and that the pairing round-trips cleanly
# (group count + ids + assertion total match the IR's forward projection).
#
# Block mode: the job fails the PR on any missing or mismatched pairing.
# Supervisor is currently clean (paired: 5, missing: 0, mismatched: 0).
#
# The shared check script lives in `@qontinui/ui-bridge-auto` on npm and
# is invoked via `npx --yes -p <pkg> <bin>`. The `-p` flag is required
# because the package exposes multiple binaries.

on:
  pull_request:
    branches: [main]
    paths:
      - "**/*.spec.uibridge.json"
      - "**/specs/pages/**"
      - ".github/workflows/spec-pairing.yml"
  push:
    branches: [main]
    paths:
      - "**/*.spec.uibridge.json"
      - "**/specs/pages/**"
      - ".github/workflows/spec-pairing.yml"
  workflow_dispatch:

jobs:
  check-pairing:
    name: Check spec <-> IR pairing
    runs-on: ubuntu-latest
    steps:
      - name: Checkout qontinui-supervisor
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Run pairing check (block mode)
        run: npx --yes -p @qontinui/ui-bridge-auto check-spec-pairing --root . --mode=block
