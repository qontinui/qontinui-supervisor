name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  rust-check:
    name: Rust Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust stable toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Check formatting
        run: cargo fmt --check

      - name: Run clippy
        run: cargo clippy -- -D warnings

      - name: Run tests
        run: cargo test

      - name: Build
        run: cargo build

  frontend-check:
    name: Frontend Check
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout qontinui-supervisor
        uses: actions/checkout@v4

      # qontinui-supervisor's frontend declares a file:-protocol dep:
      #   - @qontinui/ui-bridge-eslint-plugin
      #     -> file:../../ui-bridge/packages/ui-bridge-eslint-plugin
      # From qontinui-supervisor/frontend/, ../.. resolves to
      # /home/runner/work/qontinui-supervisor/. Cloning ui-bridge there
      # makes the file: dep resolve. Public repo, no auth needed.
      - name: Checkout sibling repos
        run: |
          cd "$GITHUB_WORKSPACE/.."
          git clone --depth 1 https://github.com/qontinui/ui-bridge.git

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      # ui-bridge-eslint-plugin's dist/ is committed upstream
      # (qontinui/ui-bridge#2), so the cloned sibling has the built
      # artifacts ready to use.
      #
      # --install-links copies the file: dep into node_modules instead of
      # symlinking, so the plugin's transitive deps resolve through the
      # consumer's node_modules tree.
      - name: Install dependencies
        run: npm ci --install-links

      - name: TypeScript type check
        run: npx tsc --noEmit

      - name: Lint
        run: npm run lint 2>/dev/null || echo "No lint script configured, skipping"
        if: always()

      - name: Format check
        run: npx prettier --check "src/**/*.{ts,tsx}" 2>/dev/null || echo "No prettier config, skipping"
        if: always()

      - name: Test
        run: npx vitest run 2>/dev/null || echo "No test config, skipping"
        if: always()

      - name: Build
        run: npm run build
