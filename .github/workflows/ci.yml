name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  rust-check:
    name: Rust Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      # qontinui-supervisor's Cargo.toml declares qontinui-types as a path: dep
      # at ../qontinui-schemas/rust. Without the sibling clone, clippy + tests
      # fail with "failed to read ../qontinui-schemas/rust/Cargo.toml".
      - name: Checkout sibling repos
        run: |
          cd "$GITHUB_WORKSPACE/.."
          git clone --depth 1 https://github.com/qontinui/qontinui-schemas.git

      # Pin matches rust-toolchain.toml (channel = "1.95.0"). The toolchain
      # file overrides any other channel for every cargo invocation, so the
      # rustfmt/clippy components must be installed for 1.95.0 specifically —
      # otherwise `cargo fmt`/`cargo clippy` auto-switch to a component-less
      # 1.95.0 and fail with "'cargo-fmt' is not installed".
      - name: Install Rust 1.95.0 toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.95.0"
          components: rustfmt, clippy

      - name: Cache cargo dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Check formatting
        run: cargo fmt --check

      - name: Run clippy
        run: cargo clippy -- -D warnings

      - name: Run tests
        run: cargo test

      - name: Build
        run: cargo build

  compose-parity:
    name: Compose Parity (cross-repo fixture drift)
    runs-on: ubuntu-latest

    # Enforces the supervisor-side half of the load-bearing invariant that
    # qontinui-supervisor/src/cache_key.rs::compose and
    # qontinui-coord/src/ac_gate.rs::compose stay byte-identical: the coord
    # AC-freshness gate looks build-cache keys up in the same bazel-remote
    # Action Cache this pool writes, so if the two compose() impls drift,
    # coord's lookups miss every entry the pool wrote and the optimization
    # silently degrades to a permanent 0% hit rate.
    #
    # The invariant has two halves:
    #   1. each repo's compose() reproduces its LOCAL compose_parity.json
    #      fixture (the `compose_parity::matches_canonical_fixture` unit test
    #      in each repo), and
    #   2. the two fixtures are byte-identical to each other (cross-repo).
    #
    # This job owns half 1 for the supervisor: it runs the in-repo
    # `compose_parity` unit test asserting supervisor's compose() == its
    # local fixture.
    #
    # Half 2 (cross-repo byte-identity) is NO LONGER done here. supervisor is
    # a PUBLIC repo but qontinui-coord is now PRIVATE, and GitHub serves a 404
    # for private raw.githubusercontent.com content to anonymous clients. The
    # old curl-from-raw fetch therefore failed on every supervisor PR, and we
    # deliberately do not add a cross-repo PAT secret (the default GITHUB_TOKEN
    # cannot read another private repo either). The direction is flipped: coord
    # now has its own CI which CAN fetch supervisor's PUBLIC fixture
    # unauthenticated and assert byte-identity there. So the cross-repo check
    # lives in coord's CI; this job is secret-free.
    #
    # FIX on drift: update BOTH compose() impls AND regenerate
    # tests/fixtures/compose_parity.json in BOTH repos in lockstep.
    # See memory proj_row_10_item_8_ac_gate.

    steps:
      - name: Checkout qontinui-supervisor
        uses: actions/checkout@v5

      # qontinui-supervisor's Cargo.toml declares qontinui-types as a path: dep
      # at ../qontinui-schemas/rust. Without the sibling clone, the build
      # fails with "failed to read ../qontinui-schemas/rust/Cargo.toml".
      - name: Checkout sibling repos
        run: |
          cd "$GITHUB_WORKSPACE/.."
          git clone --depth 1 https://github.com/qontinui/qontinui-schemas.git

      # Pin matches rust-toolchain.toml (channel = "1.95.0"). The toolchain
      # file overrides any other channel for every cargo invocation.
      - name: Install Rust 1.95.0 toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.95.0"
          components: rustfmt, clippy

      - name: Cache cargo dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Assert compose() reproduces the local parity fixture
        run: cargo test compose_parity

  frontend-check:
    name: Frontend Check
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout qontinui-supervisor
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: TypeScript type check
        run: npx tsc --noEmit

      - name: Lint
        run: npm run lint 2>/dev/null || echo "No lint script configured, skipping"
        if: always()

      - name: Format check
        run: npx prettier --check "src/**/*.{ts,tsx}" 2>/dev/null || echo "No prettier config, skipping"
        if: always()

      - name: Test
        run: npx vitest run 2>/dev/null || echo "No test config, skipping"
        if: always()

      - name: Build
        run: npm run build
