name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  rust-check:
    name: Rust Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      # qontinui-supervisor's Cargo.toml declares qontinui-types as a path: dep
      # at ../qontinui-schemas/rust. Without the sibling clone, clippy + tests
      # fail with "failed to read ../qontinui-schemas/rust/Cargo.toml".
      - name: Checkout sibling repos
        run: |
          cd "$GITHUB_WORKSPACE/.."
          git clone --depth 1 https://github.com/qontinui/qontinui-schemas.git

      - name: Install Rust stable toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Check formatting
        run: cargo fmt --check

      - name: Run clippy
        run: cargo clippy -- -D warnings

      - name: Run tests
        run: cargo test

      - name: Build
        run: cargo build

  compose-parity:
    name: Compose Parity (cross-repo fixture drift)
    runs-on: ubuntu-latest

    # Enforces the load-bearing invariant that
    # qontinui-supervisor/src/cache_key.rs::compose and
    # qontinui-coord/src/ac_gate.rs::compose stay byte-identical: the coord
    # AC-freshness gate looks keys up in the same bazel-remote Action Cache
    # this pool writes. The per-repo `compose_parity::matches_canonical_fixture`
    # unit tests prove each compose() == its local fixture; this job proves
    # the two fixtures themselves are byte-identical (coord has no CI of its
    # own — see memory feedback_qontinui_coord_no_ci — so supervisor, the
    # canonical impl, owns the cross-repo half).

    steps:
      - name: Checkout qontinui-supervisor
        uses: actions/checkout@v5

      - name: Fetch coord's fixture from origin/main and assert byte-identity
        env:
          COORD_RAW_URL: https://raw.githubusercontent.com/qontinui/qontinui-coord/main/tests/fixtures/compose_parity.json
          LOCAL_FIXTURE: tests/fixtures/compose_parity.json
        run: |
          set -euo pipefail

          fail() {
            echo "::error title=compose() cross-repo parity violation::$1"
            echo ""
            echo "INVARIANT: qontinui-supervisor/src/cache_key.rs::compose and"
            echo "qontinui-coord/src/ac_gate.rs::compose MUST be byte-identical."
            echo "The coord AC-freshness gate looks build-cache keys up in the"
            echo "same bazel-remote Action Cache the supervisor pool writes; if"
            echo "the two compose() impls drift, coord's lookups miss every"
            echo "entry the pool wrote and the optimization silently degrades"
            echo "to a permanent 0% hit rate."
            echo ""
            echo "FIX: update BOTH impls AND regenerate"
            echo "tests/fixtures/compose_parity.json in BOTH repos in lockstep."
            echo "See memory proj_row_10_item_8_ac_gate."
            exit 1
          }

          # Fetch coord's fixture with one retry (network-flake resilience).
          # A persistent fetch failure FAILS the job naming the invariant —
          # it must never silently pass.
          fetch() { curl -fsSL --max-time 30 "$COORD_RAW_URL" -o coord_fixture.json; }
          if ! fetch; then
            echo "coord fixture fetch failed; retrying once in 5s..." >&2
            sleep 5
            if ! fetch; then
              fail "could not fetch coord's compose_parity.json from origin/main after one retry ($COORD_RAW_URL). Refusing to silently pass a parity check."
            fi
          fi

          if [ ! -s coord_fixture.json ]; then
            fail "fetched coord compose_parity.json is empty ($COORD_RAW_URL)."
          fi

          local_sha=$(sha256sum "$LOCAL_FIXTURE" | cut -d' ' -f1)
          coord_sha=$(sha256sum coord_fixture.json | cut -d' ' -f1)
          echo "supervisor $LOCAL_FIXTURE sha256 = $local_sha"
          echo "coord   (origin/main) sha256 = $coord_sha"

          if ! cmp -s "$LOCAL_FIXTURE" coord_fixture.json; then
            echo "--- diff (supervisor vs coord@origin/main) ---"
            diff -u "$LOCAL_FIXTURE" coord_fixture.json || true
            fail "the two compose_parity.json fixtures have diverged (sha256 $local_sha vs $coord_sha)."
          fi

          echo "compose-parity fixtures are byte-identical across both repos ✓"

  frontend-check:
    name: Frontend Check
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout qontinui-supervisor
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: TypeScript type check
        run: npx tsc --noEmit

      - name: Lint
        run: npm run lint 2>/dev/null || echo "No lint script configured, skipping"
        if: always()

      - name: Format check
        run: npx prettier --check "src/**/*.{ts,tsx}" 2>/dev/null || echo "No prettier config, skipping"
        if: always()

      - name: Test
        run: npx vitest run 2>/dev/null || echo "No test config, skipping"
        if: always()

      - name: Build
        run: npm run build
