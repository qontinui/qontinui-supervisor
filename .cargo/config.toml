# qontinui-supervisor cargo config — sccache defaults (local-disk backend) +
# Row 2 Phase 3 path-remap.
#
# Cut over from shared AWS S3 (qontinui-sccache, us-east-1) to the machine-
# default local disk on 2026-07-23, after the S3 backend was proven to cause a
# client-pileup build stall (~3-4s/op latency, ~0-2.5% hit rate, serialized
# through one sccache server → a ~100-client pileup that stalled all cargo
# builds under fleet concurrency). See
# plans/2026-07-23-sccache-client-pileup-root-cause.md. Local disk is sub-ms and
# pileup-proof; the S3 goal of cross-machine sharing was never realized (0%
# cross-worktree hit). SCCACHE_DIR / SCCACHE_CACHE_SIZE are intentionally NOT
# pinned here (a hardcoded path would break other machines + CI-Linux) — sccache
# uses its machine default; per-machine overrides go in User-scope env.
# RUSTC_WRAPPER stays opt-in/unpinned (export RUSTC_WRAPPER=sccache); CI sets no
# sccache env, so this change is inert in CI.
# See plans/2026-05-14-fleet-topology-and-build-pool-design.md §3.3.

[env]
# Ξ_sccache: Docker/WSL hold sccache's default port 4226 on the build hosts;
# clients that land there wedge ("version mismatch") + respawn. Pin off 4226 so
# every cargo-spawned sccache client agrees on the port regardless of OS-env
# inheritance (the User-env value was not inherited by all contexts).
SCCACHE_SERVER_PORT = { value = "4230", force = false }

# Repro flags for content-addressed cache compatibility (Row 10 Wave 0).
#
# --remap-path-prefix entries (Row 2 Phase 3): collapse the per-worktree
# absolute prefix so sccache cache keys are path-independent across
# worktrees on the same machine. Order: longer prefix first (`.wt`
# before bare). For variable per-agent worktree paths the agent shell
# additionally sets `RUSTFLAGS=--remap-path-prefix=$WORKTREE_ROOT=...`.
[target.x86_64-pc-windows-msvc]
rustflags = [
    "-C", "link-arg=/Brepro",
    "--remap-path-prefix=D:/qontinui-root.wt=/qontinui",
    "--remap-path-prefix=D:/qontinui-root=/qontinui",
]

[target.x86_64-unknown-linux-gnu]
rustflags = [
    "-C", "link-arg=-Wl,--build-id=none",
    "--remap-path-prefix=/home/runner/qontinui-root.wt=/qontinui",
    "--remap-path-prefix=/home/runner/qontinui-root=/qontinui",
]

[target.aarch64-unknown-linux-gnu]
rustflags = [
    "-C", "link-arg=-Wl,--build-id=none",
    "--remap-path-prefix=/home/runner/qontinui-root.wt=/qontinui",
    "--remap-path-prefix=/home/runner/qontinui-root=/qontinui",
]
